apiVersion: apps/v1
kind: Deployment
metadata: 
  name: worker-deployment

spec: 
  template:
    metadata: 
      name: worker
      labels: 
        app: worker

    spec: 
      containers:
        - name: worker
          image: dockersamples/examplevotingapp_worker
      
       
  replicas: 3 
  selector: 
    matchLabels: 
      app: worker