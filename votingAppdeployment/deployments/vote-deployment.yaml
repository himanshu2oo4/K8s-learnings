apiVersion: apps/v1
kind: Deployment
metadata: 
  name: vote-deployment
spec: 
  replicas: 3 
  template: 
    metadata:
      name: vote-pod
      labels: 
        app: vote 
    spec: 
      containers:
        - name: vote
          image: dockersamples/examplevotingapp_vote
          ports: 
            - containerPort: 80
              name: vote 

  selector: 
    matchLabels: 
      app: vote