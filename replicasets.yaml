apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myreplicaset
  labels:
    app: myapp
    tier: front-end
spec:
  replicas: 3 
  selector:
    matchLabels:
      app: myapp 
  template:
    metadata:
      name: nginx-pod
      labels:
        app: myapp 
        tier: front-end
    spec:
      containers:
        - name: nginx
          image: nginx:latest 
          ports: 
            - containerPort: 80
