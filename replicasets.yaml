apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myreplicaset
  labels:
    app: myapp
    tier: front-end
spec:
  replicas: 3 
  selector:
    matchLabels:
      env: production
  template:
    metadata:
      labels:
        env: production    # if i already have 2 pods which have env production label so it will create only 1 extra pod 
                        # Replicasets check both already existing and newly created pods to match the 
                           # desired state 
    spec:
      containers:
        - name: nginx
          image: nginx:latest 
          ports: 
            - containerPort: 80
          
